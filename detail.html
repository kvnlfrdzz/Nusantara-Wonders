<!DOCTYPE html>
<html>
<head>
  <title>Nusantara Wonders - Menjelajahi Kekayaan Sosial Budaya Indonesia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container detail-page">

  <button class="back-btn" onclick="goBack()">← Kembali</button>

  <div id="detail"></div>

</div>

<script>
const id = new URLSearchParams(window.location.search).get('id');
const BASE_URL = 'https://aplikasiku-production.up.railway.app';

// Tambahin '/' setelah posts supaya jadi /api/posts/ID
fetch(`${BASE_URL}/api/posts/${id}`)
.then(res => res.json())
.then(res => {
  const p = res.data;

  // Catat View
  fetch(`${BASE_URL}/api/posts/${id}/view`, { method: 'POST' });

  document.getElementById('detail').innerHTML = `
    <div class="card detail-card">
      <img src="${BASE_URL}/storage/posts/${p.image}">
      <div class="card-body">
        <div class="categories">
            ${p.categories ? p.categories.map(c => `<span class="category">${c.name}</span>`).join('') : ''}
        </div>
        <h1>${p.title}</h1>
        <div class="content">
            ${p.content}
        </div>
      </div>
    </div>`;
})
.catch(err => {
    document.getElementById('detail').innerHTML = '<p>Gagal memuat data...</p>';
    console.error(err);
});

function goBack() {
  window.history.back();
}
</script>

</body>
</html>
